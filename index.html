<html lang="ko">
<head>

<title>2026 고1 3월 모의고사</title>
<style>
:root{
  --green:#1D9E75;--green-d:#0F6E56;--green-l:#E1F5EE;--green-deep:#085041;
  --red:#A32D2D;--red-l:#FCEBEB;--red-deep:#501313;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-deep:#633806;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-deep:#0C3A6B;
  --bg:#F5F3EF;--card:#FFFFFF;--border:rgba(0,0,0,0.08);
  --text:#1a1a1a;--muted:#666;--hint:#aaa;--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans KR","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:700px;margin:0 auto;padding:24px 16px 60px;}
.intro-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2rem 1.5rem;margin-top:16px;}
.intro-logo{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--green);text-transform:uppercase;margin-bottom:14px;text-align:center;}
.intro-title{font-size:24px;font-weight:800;line-height:1.3;margin-bottom:6px;text-align:center;}
.intro-sub{font-size:13px;color:var(--muted);margin-bottom:22px;text-align:center;}
.section-label{font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px;}
.check-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.check-item{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 8px;cursor:pointer;transition:all .15s;user-select:none;}
.check-item.selected{background:var(--green-l);border-color:var(--green);}
.check-item-num{font-size:17px;font-weight:800;color:var(--text);margin-bottom:2px;}
.check-item.selected .check-item-num{color:var(--green-deep);}
.check-item-sub{font-size:12px;color:var(--muted);line-height:1.4;}
.check-item.selected .check-item-sub{color:var(--green);}
.ctrl-row{display:flex;gap:8px;margin-bottom:20px;}
.ctrl-btn{flex:1;padding:9px;font-size:12px;font-weight:700;font-family:inherit;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);color:var(--muted);cursor:pointer;transition:all .12s;}
.ctrl-btn:hover{border-color:var(--green);color:var(--green);}
.info-row{display:flex;gap:10px;margin-bottom:20px;}
.info-chip{flex:1;background:var(--bg);border-radius:var(--rs);padding:10px;text-align:center;}
.info-chip-num{font-size:20px;font-weight:800;color:var(--green);}
.info-chip-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.start-btn{width:100%;padding:15px;font-size:15px;font-weight:800;font-family:inherit;background:var(--green);color:#fff;border:none;border-radius:var(--r);cursor:pointer;transition:background .15s,transform .1s;}
.start-btn:hover{background:var(--green-d);}
.start-btn:active{transform:scale(.98);}
.start-btn:disabled{background:#CCC;cursor:default;}
.type-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800;}
.tb-g{background:var(--blue-l);color:var(--blue-deep);}
.hd-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.quiz-counter{font-size:13px;font-weight:700;color:var(--muted);}
.cutline-chip{font-size:12px;font-weight:700;color:var(--green-deep);background:var(--green-l);padding:3px 10px;border-radius:99px;}
.progress-wrap{height:5px;background:#DDD;border-radius:99px;overflow:hidden;margin-bottom:12px;}
.progress-fill{height:5px;background:var(--green);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.timer-row{display:flex;justify-content:flex-end;margin-bottom:12px;}
.timer-block{display:flex;flex-direction:column;align-items:center;gap:2px;}
.timer-lbl{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;}
.timer-ring{position:relative;width:52px;height:52px;}
.timer-ring svg{transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:4;}
.ring-bg{stroke:#E0E0E0;}
.ring-fill{stroke:var(--green);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .4s;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--text);}
.tw .ring-fill{stroke:var(--amber);}.tw .timer-num{color:var(--amber);}
.td .ring-fill{stroke:var(--red);}.td .timer-num{color:var(--red);}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.td .timer-ring{animation:pulse .8s infinite;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px;animation:fadeUp .22s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:13px;color:var(--hint);margin-bottom:8px;}
.q-en{font-size:17px;line-height:2;margin-bottom:14px;color:var(--text);}
.q-sub{font-size:16px;color:var(--text);margin-bottom:12px;}
.blank-tag{font-weight:800;font-size:16px;color:var(--blue);background:var(--blue-l);padding:2px 8px;border-radius:5px;margin:0 2px;}
.choices{display:flex;gap:8px;flex-wrap:wrap;}
.choice-btn{flex:1;min-width:90px;padding:12px 14px;font-size:16px;font-family:inherit;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);color:var(--text);cursor:pointer;text-align:center;font-weight:600;transition:all .12s;}
.choice-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-l);color:var(--green-deep);}
.choice-btn.correct{background:var(--green-l);border-color:var(--green);color:var(--green-deep);font-weight:800;}
.choice-btn.wrong{background:var(--red-l);border-color:var(--red);color:var(--red-deep);}
.choice-btn:disabled{cursor:default;}
.timeout-msg{margin-top:10px;padding:10px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;background:var(--amber-l);color:var(--amber-deep);border:1px solid #FAC775;}
.answer-reveal{margin-top:10px;padding:9px 13px;border-radius:var(--rs);font-size:13px;font-weight:600;}
.ar-ok{background:var(--green-l);color:var(--green-deep);}
.ar-ng{background:var(--red-l);color:var(--red-deep);}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:30px 22px;text-align:center;margin-bottom:14px;}
.result-emoji{font-size:46px;margin-bottom:10px;}
.result-score{font-size:54px;font-weight:800;line-height:1;margin-bottom:8px;}
.score-pass{color:var(--green);}.score-fail{color:var(--red);}
.result-badge{display:inline-block;padding:5px 16px;border-radius:99px;font-size:14px;font-weight:800;margin-bottom:8px;}
.badge-pass{background:var(--green-l);color:var(--green-deep);}.badge-fail{background:var(--red-l);color:var(--red-deep);}
.result-pct{font-size:13px;color:var(--muted);margin-bottom:20px;}
.stat-row{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;}
.stat-card{background:var(--bg);border-radius:var(--rs);padding:12px 16px;}
.stat-num{font-size:22px;font-weight:800;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.s-ok{color:var(--green);}.s-ng{color:var(--red);}.s-to{color:var(--amber);}
.result-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.retry-btn{padding:14px;font-size:14px;font-weight:800;font-family:inherit;background:var(--green);color:#fff;border:none;border-radius:var(--r);cursor:pointer;}
.retry-btn:hover{background:var(--green-d);}
.back-btn{padding:14px;font-size:14px;font-weight:800;font-family:inherit;background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;}
.back-btn:hover{border-color:var(--green);color:var(--green);}
.review-title{font-size:14px;font-weight:800;margin-bottom:10px;margin-top:14px;}
.review-item{background:var(--card);border:1px solid #F09595;border-radius:var(--rs);padding:13px 15px;margin-bottom:8px;}
.review-item.to{border-color:#FAC775;}
.r-num{font-size:11px;color:var(--hint);margin-bottom:6px;}
.r-en{font-size:15px;color:var(--text);margin-bottom:8px;line-height:1.8;}
.tag{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;margin-right:4px;margin-top:2px;}
.tag-ng{background:var(--red-l);color:var(--red-deep);}.tag-ok{background:var(--green-l);color:var(--green-deep);}.tag-to{background:var(--amber-l);color:var(--amber-deep);}





.set-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.set-card{background:var(--bg);border-radius:var(--rs);padding:12px;}
.set-lbl{font-size:11px;color:var(--muted);margin-bottom:6px;}

.set-hint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px;}

.hist-ttl{font-size:14px;font-weight:800;}
.hist-clear{font-size:11px;font-weight:600;color:var(--red);background:none;border:none;cursor:pointer;}
.hist-empty{font-size:13px;color:var(--hint);text-align:center;padding:16px 0;}
.hist-item{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}

.hist-left{flex:1;min-width:0;}

.hist-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;white-space:nowrap;}
.hb-pass{background:var(--green-l);color:var(--green-deep);}
.hb-fail{background:var(--red-l);color:var(--red-deep);}

.hist-range{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.range-chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--blue-l);color:var(--blue-deep);}
.hd-item{background:var(--bg);border-radius:var(--rs);padding:9px 11px;margin-bottom:5px;}

.hd-qnum{font-size:10px;color:var(--hint);margin-bottom:3px;}
.hd-en{font-size:12px;line-height:1.7;margin-bottom:4px;}
.hd-tags{display:flex;flex-wrap:wrap;gap:4px;}
.toggle-txt{font-size:11px;color:var(--muted);}

.academy-header{display:flex;justify-content:center;padding:20px 0 12px;margin-bottom:0;}
.academy-logo{height:52px;width:auto;object-fit:contain;}
.result-academy-header{display:flex;justify-content:center;margin-bottom:18px;}
.result-academy-logo{height:44px;width:auto;object-fit:contain;}
</style>

function updateTimerUI(){
  const ring=document.querySelector('.ring-fill'),num=document.querySelector('.timer-num'),wrap=document.querySelector('.tw-inner');
  if(!ring||!num)return;
  ring.style.strokeDashoffset=CIRCUM*(1-(timerSec/T_G));
  num.textContent=timerSec;
  if(wrap)wrap.className='tw-inner'+(timerSec<=2?'td':timerSec<=4?'tw':'');
}
function onTimeout(){
  if(advancing)return;
  clearInterval(timerInterval);timeouts[idx]=true;answers[idx]='__timeout__';advancing=true;
  render();setTimeout(()=>{advancing=false;advance();},1300);

function renderQuiz(){
  const q=questions[idx],pct=Math.round((idx/TOTAL)*100);
  const offset=CIRCUM*(1-(timerSec/T_G)),twCls=timerSec<=2?'td':timerSec<=4?'tw':'';
  const isTO=timeouts[idx];
  let enHtml=q.en||'';
  if(q.blanks)q.blanks.forEach(b=>{enHtml=enHtml.replace(b.l,`<span class="blank-tag">${b.l}</span>`);});
  const curBi=q.blanks?q.blanks.findIndex((_,bi)=>answers[`${idx}_${bi}`]===undefined):-1;
  const b=curBi>=0?q.blanks[curBi]:null;
  let body='';
  if(isTO){
    body=`<div class="timeout-msg">⏰ 시간 초과! &nbsp;정답: <strong>${q.blanks.map(x=>x.a).join(' / ')}</strong></div>`;
  }else if(b){
    body=`<div class="q-sub">${b.l} 중 알맞은 것은?</div><div class="choices">${b.c.map(c=>`<button class="choice-btn" data-bi="${curBi}" data-ch="${c}">${c}</button>`).join('')}</div>`;
  }
  return `<div class="hd-row">
  <div class="quiz-counter">${userName} &nbsp;·&nbsp; 문항 ${idx+1} / ${TOTAL}</div>
  <div class="cutline-chip">커트라인 ${CUTLINE}개</div>
</div>
<div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="timer-row"><div class="timer-block"><div class="timer-lbl">남은시간</div>
<div class="tw-inner ${twCls}"><div class="timer-ring"><svg width="52" height="52" viewBox="0 0 52 52"><circle class="ring-bg" cx="26" cy="26" r="20"/><circle class="ring-fill" cx="26" cy="26" r="20" stroke-dasharray="${CIRCUM}" stroke-dashoffset="${offset}"/></svg><div class="timer-num">${timerSec}</div></div></div></div></div>
<div class="q-card">
  <div class="q-num">${q.n} &nbsp;<span class="type-badge tb-g">어법 선택</span></div>
  ${enHtml?`<div class="q-en">${enHtml}</div>`:''}
  ${body}
</div>`;
}

function renderResult(){
  const correct=scoreQ(),toCount=Object.keys(timeouts).length,pass=correct>=CUTLINE;
  const pct=Math.round((correct/TOTAL)*100),emoji=pass?(correct===TOTAL?'🎉':'👍'):(correct>=Math.ceil(TOTAL*.7)?'💪':'📚');
  const wrongIdxs=questions.map((_,qi)=>qi).filter(qi=>!isCorrect(questions[qi],qi));
  const wrongItems=wrongIdxs.map(qi=>{
    const q=questions[qi],isTO=!!timeouts[qi];
    const ans=q.blanks.map(x=>x.a).join(' / ');
    const ua=q.blanks.map((_,bi)=>{const s=answers[`${qi}_${bi}`];return(!s||s==='__timeout__')?'시간초과':s;}).join(' / ');
    return{n:q.n,en:q.en||'',ans,ua,isTO};
  });

  <div class="result-emoji">${emoji}</div>

  <div class="result-badge ${pass?'badge-pass':'badge-fail'}">${pass?'합격 ✓':'불합격 ✗'} · 커트라인 ${CUTLINE}개</div>

  <div class="stat-row">
    <div class="stat-card"><div class="stat-num s-ok">${correct}</div><div class="stat-lbl">정답</div></div>
    <div class="stat-card"><div class="stat-num s-ng">${TOTAL-correct-toCount}</div><div class="stat-lbl">오답</div></div>
    <div class="stat-card"><div class="stat-num s-to">${toCount}</div><div class="stat-lbl">시간초과</div></div>
  </div>
  <div class="result-btns">
    <button class="back-btn" id="back-btn">범위 다시 선택</button>
    <button class="retry-btn" id="retry-btn">같은 범위 재시작</button>
  </div>
</div>
${wrongIdxs.length>0?`<div class="review-title">오답 목록 (${wrongIdxs.length}개)</div>
${wrongIdxs.map(qi=>{
  const q=questions[qi],isTO=!!timeouts[qi];
  const ans=q.blanks.map(x=>x.a).join(' / ');
  const ua=q.blanks.map((_,bi)=>{const s=answers[`${qi}_${bi}`];return(!s||s==='__timeout__')?'시간초과':s;}).join(' / ');
  return `<div class="review-item ${isTO?'to':''}"><div class="r-num">${q.n}${isTO?' ⏰':''}</div>${q.en?`<div class="r-en">${q.en}</div>`:''}<span class="tag ${isTO?'tag-to':'tag-ng'}">${isTO?'시간초과':'선택: '+ua}</span><span class="tag tag-ok">정답: ${ans}</span></div>`;
}).join('')}`:
`<div style="text-align:center;color:var(--green);font-weight:800;padding:20px;font-size:15px;">전 문항 정답! 완벽합니다 🎉</div>`}`;
}

function attachEvents(){
  const app=document.getElementById('app');
  const sb=app.querySelector('#start-btn');if(sb)sb.addEventListener('click',start);
  const rb=app.querySelector('#retry-btn');if(rb)rb.addEventListener('click',start);
  const bb=app.querySelector('#back-btn');if(bb)bb.addEventListener('click',()=>{screen='intro';render();});
  const sa=app.querySelector('#sel-all');if(sa)sa.addEventListener('click',()=>{selectedNums=[...ALL_NUMS];render();});
  const sn=app.querySelector('#sel-none');if(sn)sn.addEventListener('click',()=>{selectedNums=[];render();});
  const ni=app.querySelector('#name-inp');
  if(ni){ni.addEventListener('input',()=>{userName=ni.value;render();});setTimeout(()=>{if(document.getElementById('name-inp'))document.getElementById('name-inp').focus();},50);}
  const inpT=app.querySelector('#inp-total');
  if(inpT)inpT.addEventListener('change',()=>{userTotal=Math.max(1,parseInt(inpT.value)||1);render();});
  const inpC=app.querySelector('#inp-cut');
  if(inpC)inpC.addEventListener('change',()=>{userWrong=Math.max(0,parseInt(inpC.value)||0);render();});
  const hc=app.querySelector('#hist-clear');
  if(hc)hc.addEventListener('click',()=>{try{localStorage.removeItem(STORAGE_KEY);}catch{}render();});
  app.querySelectorAll('.check-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const n=parseInt(item.dataset.num);
      if(selectedNums.includes(n))selectedNums=selectedNums.filter(x=>x!==n);
      else selectedNums.push(n);
      selectedNums.sort((a,b)=>a-b);
      render();
    });
  });
  app.querySelectorAll('.hist-item').forEach(item=>{
    item.addEventListener('click',e=>{
      if(e.target.closest('#hist-clear'))return;
      const hi=item.dataset.hi,detail=document.getElementById('hd-'+hi);
      if(!detail)return;
      const isOpen=detail.classList.contains('open');
      app.querySelectorAll('.hist-detail').forEach(d=>d.classList.remove('open'));
      app.querySelectorAll('.toggle-txt').forEach(t=>{t.textContent='오답 보기 ▼';});
      if(!isOpen){detail.classList.add('open');const txt=item.querySelector('.toggle-txt');if(txt)txt.textContent='닫기 ▲';}
    });
  });
  app.querySelectorAll('.choice-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const bi=parseInt(btn.dataset.bi),key=`${idx}_${bi}`;
    if(answers[key]!==undefined||advancing)return;
    clearInterval(timerInterval);advancing=true;
    const cor=questions[idx].blanks[bi].a,ch=btn.dataset.ch;
    answers[key]=ch;answers[idx]=ch;
    const ok=ch===cor;
    btn.classList.add(ok?'correct':'wrong');
    btn.parentElement.querySelectorAll('.choice-btn').forEach(b2=>{b2.disabled=true;if(!ok&&b2.dataset.ch===cor)b2.classList.add('correct');});
    const nb=questions[idx].blanks.findIndex((_,i)=>answers[`${idx}_${i}`]===undefined);
    setTimeout(()=>{if(nb>=0){advancing=false;clearInterval(timerInterval);timerSec=T_G;startTimer();render();}else{advancing=false;advance();}},ok?400:800);
  }));
}
render();
</script>
